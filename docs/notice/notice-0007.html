    <h1 class="notice-title">졸업요건(졸업이수학점·전공필수) 점검 안내</h1>
    <div class="notice-meta">분류: 일반 · 게시일: 2026-07-05</div>
    <p class="notice-body">2027년 2월 졸업 예정자는 졸업이수학점과 전공필수 이수 여부를 학사정보시스템 졸업진단에서 점검하시기 바랍니다. 컴퓨터공학과 졸업요건은 총 130학점, 전공 66학점 이상이며 캡스톤디자인 이수가 필수입니다.</p>
