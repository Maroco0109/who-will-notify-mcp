name: weekly-scholarship-sync

on:
  schedule:
    # 매주 월 07:00 KST = 일 22:00 UTC. 원천(한국장학재단)은 월 갱신이라 주 1회로 충분.
    - cron: "0 22 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scholarship-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # data.go.kr 15028252 오픈API fetch → 정규화 + 안전게이트 → data/notices.json upsert.
      # 게이트(에러봉투/완전성/shape/최소건수/크기/키유출) 실패 시 exit 1 → 커밋 안 함.
      - name: Sync scholarships from data.go.kr
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          # (선택) 월 갱신 시 최신 uddi 로 덮어쓰기. 미설정 시 스크립트 기본값 사용.
          DATA_GO_KR_UDDI: ${{ vars.DATA_GO_KR_UDDI }}
        run: node scripts/sync-notices.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet data/notices.json; then
            git config user.name "notice-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/notices.json
            git commit -m "chore(data): weekly scholarship sync $(date -u +%FT%TZ)"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
